version: "3.9"

services:
  bot:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: sbitb-bot
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - bot-data:/app/data
    networks:
      - sbitb-net

  db:
    image: postgres:16-alpine
    container_name: sbitb-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sbitb
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d sbitb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sbitb-net

  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: sbitb-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - sbitb-net

volumes:
  pg-data:
  bot-data:

networks:
  sbitb-net:
    driver: bridge
